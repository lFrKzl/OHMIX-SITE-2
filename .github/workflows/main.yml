name: Deploy Automático para Hostinger

on:
  push:
    branches:
      - main     # ou master, dependendo de como está o nome da sua branch principal

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Versão do NodeJS

      - name: Instalar Dependências
        run: npm install

      - name: Construir o site (Build)
        run: npm run build

      - name: Enviar para a Hostinger (FTP Sync)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/ # O Vite gera os arquivos finais na pasta "dist/"
